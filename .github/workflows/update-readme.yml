name: Update README Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node .github/scripts/update-stats.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config user.name "Batcomputer"
          git config user.email "arkham-bot@isaj011.dev"
          git add README.md
          git diff --staged --quiet || git commit -m "chore(bot): update live stats [skip ci]"
          git push
