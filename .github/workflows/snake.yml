# ============================================================
#  FILE LOCATION: .github/workflows/snake.yml
#
#  WHAT IT DOES:
#    Reads your real GitHub contribution grid and generates
#    an animated snake SVG. Runs every 12 hours automatically.
#    The SVG is pushed to the `output` branch and referenced
#    in your README.md.
#
#  FIRST RUN:
#    1. Commit this file to your Isaj011/Isaj011 repo
#    2. Go to Actions tab on GitHub
#    3. Click "Generate Snake" in the left sidebar
#    4. Click "Run workflow" → Run workflow
#    5. Wait ~30 seconds for it to complete
#    6. The snake SVG will appear in your README instantly
#
#  AFTER FIRST RUN:
#    Runs automatically every 12 hours — no action needed.
#
#  CUSTOMISE SNAKE COLOUR:
#    Change color_snake=3a7bd5 to any hex colour you want.
#    e.g. color_snake=c8a84b for gold, color_snake=2ecc71 for green
# ============================================================

name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:           # allow manual trigger from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake SVG from contribution grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=3a7bd5

      - name: Push SVG to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
